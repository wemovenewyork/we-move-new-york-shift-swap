name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          NEXT_PUBLIC_APP_URL: https://we-move-ny-shift-swap.vercel.app
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          RESEND_API_KEY: placeholder
          EMAIL_FROM: placeholder@resend.dev
          VAPID_EMAIL: placeholder@example.com
          VAPID_PUBLIC_KEY: placeholder
          VAPID_PRIVATE_KEY: placeholder
          CRON_SECRET: placeholder
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder
