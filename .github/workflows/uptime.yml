name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:         # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health
        id: health
        run: |
          # Retry once before alerting. A single cold-start blip (Vercel function
          # cold + Neon Postgres cold) can exceed 10s even on a healthy site,
          # producing false-positive pages. We try once, sleep 10s, try again.
          # Only mark the job failed if BOTH attempts fail.
          attempt() {
            curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://wmnyshiftswap.com/api/health
          }

          STATUS=$(attempt)
          if [ "$STATUS" = "200" ]; then
            echo "OK — HTTP $STATUS (first attempt)"
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "First attempt returned HTTP $STATUS — retrying in 10s"
          sleep 10
          STATUS=$(attempt)
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" != "200" ]; then
            echo "HEALTH CHECK FAILED — HTTP $STATUS (after retry)"
            exit 1
          fi
          echo "OK — HTTP $STATUS (recovered on retry)"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'uptime',
              state: 'open',
            });
            // Don't open a duplicate if one is already open
            if (issues.length > 0) {
              console.log('Uptime issue already open, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Uptime alert: /api/health returned HTTP ${{ steps.health.outputs.status }}`,
              body: [
                '## Site is down',
                '',
                `**URL:** https://wmnyshiftswap.com/api/health`,
                `**Status:** HTTP ${{ steps.health.outputs.status }}`,
                `**Time:** ${new Date().toISOString()}`,
                '',
                '### Checklist',
                '- [ ] Check Vercel dashboard for failed deployments',
                '- [ ] Check Neon DB status at console.neon.tech',
                '- [ ] Check Sentry for recent errors',
                '- [ ] If needed, roll back via Vercel → Deployments → Promote last good deploy',
                '',
                'See `RUNBOOK.md` for full rollback procedures.',
              ].join('\n'),
              labels: ['uptime'],
            });

      - name: Close resolved issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'uptime',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Site recovered at ${new Date().toISOString()} — /api/health returned 200.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
